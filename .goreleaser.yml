builds:
  - id: sreg
    goos:
      - darwin
      - windows
      - linux
    goarch:
      - amd64
      - arm64
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X github.com/labring/sreg/pkg/version.gitVersion={{.Version}}
      - -X github.com/labring/sreg/pkg/version.gitCommit={{.ShortCommit}}
      - -X github.com/labring/sreg/pkg/version.buildDate={{.Date}}
    tags:
      - containers_image_openpgp
      - netgo
      - exclude_graphdriver_devicemapper
      - static
      - osusergo
      - exclude_graphdriver_btrfs
    overrides:
      - goos: linux
        goarch: amd64
        goamd64: v1
        goarm: ""
        gomips: ""
        env:
          - CGO_ENABLED=1
          - CC=x86_64-linux-gnu-gcc
      - goos: linux
        goarch: arm64
        goarm: ""
        gomips: ""
        env:
          - CGO_ENABLED=1
          - CC=aarch64-linux-gnu-gcc
dockers:
  - id: sreg-linux-amd64
    ids:
      - sreg
    use: buildx
    goos: linux
    goarch: amd64
    dockerfile: Dockerfile
    image_templates:
      - ghcr.io/labring/sreg:{{ .Tag }}-amd64
    skip_push: "{{ .IsSnapshot }}"
  - id: sreg-linux-arm64
    ids:
      - sreg
    use: buildx
    goos: linux
    goarch: arm64
    dockerfile: Dockerfile
    image_templates:
      - ghcr.io/labring/sreg:{{ .Tag }}-arm64
    skip_push: "{{ .IsSnapshot }}"
  - id: sreg-storage-linux-amd64
    ids:
      - sreg
    use: buildx
    goos: linux
    goarch: amd64
    dockerfile: Dockerfile.sreg-storage
    image_templates:
      - ghcr.io/labring/sreg-storage:{{ .Tag }}-amd64
    extra_files:
      - scripts/sreg-storage.sh
    skip_push: "{{ .IsSnapshot }}"
  - id: sreg-storage-linux-arm64
    ids:
      - sreg
    use: buildx
    goos: linux
    goarch: arm64
    dockerfile: Dockerfile.sreg-storage
    image_templates:
      - ghcr.io/labring/sreg-storage:{{ .Tag }}-arm64
    extra_files:
      - scripts/sreg-storage.sh
    skip_push: "{{ .IsSnapshot }}"
docker_manifests:
  - id: sreg
    use: docker
    name_template: ghcr.io/labring/sreg:{{ .Tag }}
    image_templates:
      - ghcr.io/labring/sreg:{{ .Tag }}-amd64
      - ghcr.io/labring/sreg:{{ .Tag }}-arm64
    skip_push: "{{ .IsSnapshot }}"
  - id: sreg-storage
    use: docker
    name_template: ghcr.io/labring/sreg-storage:{{ .Tag }}
    image_templates:
      - ghcr.io/labring/sreg-storage:{{ .Tag }}-amd64
      - ghcr.io/labring/sreg-storage:{{ .Tag }}-arm64
    skip_push: "{{ .IsSnapshot }}"
checksum:
  name_template: 'checksums.txt'
snapshot:
  name_template: "{{ .Tag }}-next"
changelog:
  sort: asc
  use: github
  filters:
    exclude:
      - '^test:'
      - '^chore'
      - 'merge conflict'
      - Merge pull request
      - Merge remote-tracking branch
      - Merge branch
      - go mod tidy
  groups:
    - title: Dependency updates
      regexp: '^.*?(feat|fix)\(deps\)!?:.+$'
      order: 300
    - title: 'New Features'
      regexp: '^.*?feat(\([[:word:]]+\))??!?:.+$'
      order: 100
    - title: 'Security updates'
      regexp: '^.*?sec(\([[:word:]]+\))??!?:.+$'
      order: 150
    - title: 'Bug fixes'
      regexp: '^.*?fix(\([[:word:]]+\))??!?:.+$'
      order: 200
    - title: 'Documentation updates'
      regexp: ^.*?doc(\([[:word:]]+\))??!?:.+$
      order: 400
    - title: 'Build process updates'
      regexp: ^.*?build(\([[:word:]]+\))??!?:.+$
      order: 400
    - title: Other work
      order: 9999

release:
  prerelease: auto
